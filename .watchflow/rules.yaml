rules:
- description: PR title must follow conventional commits (feat, fix, docs, etc.)
  enabled: true
  severity: medium
  event_types:
  - pull_request
  parameters:
    title_pattern: ^feat|^fix|^docs|^style|^refactor|^test|^chore|^perf|^ci|^build|^revert
- description: PR description must have at least 50 characters to provide sufficient
    context for reviewers.
  enabled: true
  severity: medium
  event_types:
  - pull_request
  parameters:
    min_description_length: 50
- description: PR must not exceed 500 lines changed
  enabled: true
  severity: medium
  event_types:
  - pull_request
  parameters:
    max_lines: 500
